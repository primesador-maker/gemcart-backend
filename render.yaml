services:
  - type: web
    name: gemcart-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: BOT_TOKEN
        value: YOUR_BOT_TOKEN_HERE
      - key: ADMIN_PASSWORD
        value: sadmin
      - key: WEB_APP_URL
        value: https://primesador-maker.github.io/gemcart/
